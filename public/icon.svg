<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient: Rich Espresso to Cocoa Charcoal -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#242120" />
      <stop offset="40%" stop-color="#1a1817" />
      <stop offset="100%" stop-color="#121110" />
    </linearGradient>

    <!-- Glowing Amber Portal Core Gradient -->
    <radialGradient id="portalCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1" />
      <stop offset="15%" stop-color="#fff2d4" stop-opacity="1" />
      <stop offset="45%" stop-color="#dfa15b" stop-opacity="0.9" />
      <stop offset="75%" stop-color="#8a5e3c" stop-opacity="0.7" />
      <stop offset="95%" stop-color="#312c2a" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#121110" stop-opacity="0" />
    </radialGradient>

    <!-- Warm Sand Border Gradient -->
    <linearGradient id="sandGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e6dac6" />
      <stop offset="50%" stop-color="#faf6f0" />
      <stop offset="100%" stop-color="#e6dac6" />
    </linearGradient>

    <!-- Neon Amber Portal Swirl Outline -->
    <linearGradient id="neonGlow" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8a5e3c" />
      <stop offset="50%" stop-color="#dfa15b" />
      <stop offset="100%" stop-color="#faf6f0" />
    </linearGradient>

    <!-- High-end Glow Filter -->
    <filter id="ultraGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="16" result="blur1" />
      <feGaussianBlur stdDeviation="8" result="blur2" />
      <feMerge>
        <feMergeNode in="blur1" />
        <feMergeNode in="blur2" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Core Citadel Mask -->
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000000" flood-opacity="0.6" />
    </filter>
  </defs>

  <!-- Smooth Rounded App Icon Body -->
  <rect width="512" height="512" rx="120" fill="url(#bgGrad)" />

  <!-- Elegant Inner Border (Warm Sand Line) -->
  <rect x="20" y="20" width="472" height="472" rx="100" fill="none" stroke="url(#sandGlow)" stroke-width="4" opacity="0.35" />

  <!-- Outer Neon Portal Portal Halo ring -->
  <circle cx="256" cy="256" r="185" fill="none" stroke="url(#neonGlow)" stroke-width="1.5" opacity="0.4" stroke-dasharray="8 6" />

  <!-- Quantum Portal Background Disk -->
  <circle cx="256" cy="256" r="170" fill="url(#portalCore)" filter="url(#ultraGlow)" />

  <!-- Portal Swirling Spikes/Energy Vectors (Polished Geometric Spirograph) -->
  <g stroke="#dfa15b" stroke-width="2.5" fill="none" opacity="0.75">
    <!-- Starburst Spirograph -->
    <path d="M 256,86 C 270,170 340,170 426,256 C 340,270 340,340 256,426 C 242,340 172,340 86,256 C 172,242 172,172 256,86 Z" stroke-dasharray="4 4" />
    <!-- Secondary Intersecting Spirograph -->
    <path d="M 256,116 C 265,200 310,200 396,256 C 310,265 310,310 256,396 C 247,310 202,310 116,256 C 202,247 202,202 256,116 Z" opacity="0.4" />
  </g>

  <!-- Glowing Energy Bubbles / Micro-dimensions -->
  <g fill="#ffffff" opacity="0.8">
    <circle cx="210" cy="160" r="9" filter="url(#ultraGlow)" />
    <circle cx="310" cy="340" r="6" fill="#dfa15b" />
    <circle cx="360" cy="190" r="11" filter="url(#ultraGlow)" />
    <circle cx="150" cy="270" r="7" fill="#dfa15b" />
    <circle cx="280" cy="130" r="5" fill="#ffffff" />
    <circle cx="180" cy="350" r="10" filter="url(#ultraGlow)" />
  </g>

  <!-- The Citadel Sovereign Geometric Crest in Center -->
  <g filter="url(#softShadow)">
    <!-- Outer Octagram/Star of the Citadel Ricks -->
    <path d="M 256,140 L 290,205 L 362,205 L 310,256 L 335,325 L 256,285 L 177,325 L 202,256 L 150,205 L 222,205 Z" fill="#121110" stroke="url(#sandGlow)" stroke-width="5" stroke-linejoin="round" />

    <!-- inner Glowing Core (Portal Portal Gun Energy Well) -->
    <circle cx="256" cy="245" r="32" fill="#1c1917" stroke="#dfa15b" stroke-width="2" />
    <circle cx="256" cy="245" r="12" fill="#ffffff" filter="url(#ultraGlow)" />

    <!-- Stylized "Citadel Tower / Portal Spire" Overlay -->
    <path d="M 256,170 L 265,215 L 285,245 L 256,255 L 227,245 L 247,215 Z" fill="url(#sandGlow)" opacity="0.95" />
    <line x1="256" y1="160" x2="256" y2="235" stroke="#faf6f0" stroke-width="3.5" stroke-linecap="round" />
  </g>

  <!-- Tiny floating orbital rings for atomic sci-fi feeling -->
  <ellipse cx="256" cy="256" rx="220" ry="80" fill="none" stroke="url(#sandGlow)" stroke-width="2" stroke-dasharray="10 15" transform="rotate(-30 256 256)" opacity="0.25" />
  <ellipse cx="256" cy="256" rx="220" ry="80" fill="none" stroke="#dfa15b" stroke-width="1.5" stroke-dasharray="15 20" transform="rotate(30 256 256)" opacity="0.2" />
</svg>
